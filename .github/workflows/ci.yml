name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swift:
    name: Swift Build & Test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Cache Swift build artifacts
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-swift-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swift-

      - name: Build
        run: swift build -v

      - name: Test
        run: swift test -v

  python:
    name: Python Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: cli/pyproject.toml

      - name: Install dependencies
        run: pip install -e ./cli

      - name: Lint (ruff)
        run: |
          pip install ruff
          ruff check cli/ssk/

      - name: Compile check
        run: python -m py_compile cli/ssk/*.py

      - name: Validate schemas
        run: python -c "from ssk.schema import CorpusFile, QueriesFile; print('Schema imports OK')"

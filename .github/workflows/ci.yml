name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swift:
    name: Swift Build & Test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: swift build -v

      - name: Test
        run: swift test -v

  python:
    name: Python Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile check
        run: python -m py_compile cli/ssk/*.py

      - name: Validate schemas
        run: |
          pip install pydantic pydantic-settings typing_extensions
          python -c "from cli.ssk.schema import CorpusFile, QueriesFile; print('Schema imports OK')"
